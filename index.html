<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Lumina Beauty Dashboard</title>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">Lumina</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">Dashboard</a>
      <a href="#">Products</a>
    </nav>
    <button id="themeToggle">🌙</button>
</header>

  <!-- Hero -->
  <section class="hero">  
    <div class="hero-content">
      <span class="hero-badge">Personalized Beauty Intelligence</span>
      <h1>Discover Your Perfect Beauty Routine</h1>
      <p>AI-inspired skincare recommendations tailored to your skin type, concerns, and goals.</p>
      <button id="startQuizBtn" class="btn-primary">Start Analysis</button>
    </div>
</section>

  <!-- Quiz -->
  <section class="quiz hidden">
    <div class="progress-wrapper">
      <div class="progress-bar"></div>
    </div>

    <div id="quizContainer"></div>
  </section>

  <!-- Dashboard -->
  <section class="dashboard hidden">
    <div id="dashboardContent"></div>
  </section>

  <!-- Product Explorer -->
  <section class="products">

    <div class="products-header">

      <input
        type="text"
        id="searchInput"
        placeholder="Search products..."
      />

      <select id="filterSelect">
        <option value="all">All</option>
        <option value="dry">Dry Skin</option>
        <option value="oily">Oily Skin</option>
        <option value="sensitive">Sensitive Skin</option>
        <option value="favorite">Favorites</option>
      </select>

    </div>

    <div id="productsGrid"></div>

  </section>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">

      <button id="closeModal">
        ✕
      </button>

      <div id="modalBody"></div>

    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 Lumina Beauty Dashboard</p>
  </footer>

  <script src="js/app.js"></script>

</body>
</html>
